# Test stack for ci-fast/ci-deep integration jobs and local pre-PR checks.
# Pool sized per plan §2.6: max_connections=120 supports the 60-connection
# app pool plus headroom for migrations and concurrent test workers.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ideen
      POSTGRES_PASSWORD: ideen
      POSTGRES_DB: ideen_test
    command:
      - postgres
      - -c
      - max_connections=120
      - -c
      - shared_buffers=256MB
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideen -d ideen_test"]
      interval: 2s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20
