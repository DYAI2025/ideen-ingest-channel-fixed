[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    slow: long-running tests (excluded from ci-fast)
    serial: must run sequentially (acquires DB resources)
    stress: concurrency stress tests (ci-deep only)
    fuzz: hypothesis-based fuzzing (ci-deep only)
    load: load tests via locust (Iter 10)
    e2e: end-to-end tests (own job in CI)
# Coverage is enforced via the `diff-cover` step in ci-fast against
# coverage.xml; do not set --cov-fail-under here, it blocks first-iter PRs.
addopts =
    --strict-markers
    --strict-config
    -ra
